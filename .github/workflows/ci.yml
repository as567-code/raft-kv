name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test -race -count=1 -timeout=120s ./raft/... ./store/... ./crdt/...

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Docker images
        run: docker build -t raft-kv -f deploy/Dockerfile .

      - name: Start cluster
        run: cd deploy && docker compose up -d

      - name: Wait for cluster
        run: sleep 10

      - name: Run integration smoke test
        run: |
          go run ./cmd/bench -test=throughput -output=bench/results/throughput.json

      - name: Collect logs
        if: failure()
        run: cd deploy && docker compose logs

      - name: Tear down
        if: always()
        run: cd deploy && docker compose down -v
